name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Get version info
        id: version
        run: |
          echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          echo "GIT_COMMIT=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "BUILD_DATE=$(date -u '+%Y-%m-%d_%H:%M:%S')" >> $GITHUB_OUTPUT

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          BINARY_NAME=goani
          if [ "$GOOS" = "windows" ]; then
            BINARY_NAME=goani.exe
          fi
          go build -ldflags="-s -w \
            -X github.com/Yyyangshenghao/goani-cli/internal/version.Version=${{ steps.version.outputs.VERSION }} \
            -X github.com/Yyyangshenghao/goani-cli/internal/version.GitCommit=${{ steps.version.outputs.GIT_COMMIT }} \
            -X github.com/Yyyangshenghao/goani-cli/internal/version.BuildDate=${{ steps.version.outputs.BUILD_DATE }}" \
            -o dist/${BINARY_NAME} ./cmd/goani

      - name: Create archive
        run: |
          cd dist
          ARCHIVE_NAME=goani-${{ matrix.goos }}-${{ matrix.goarch }}
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip ${ARCHIVE_NAME}.zip goani.exe
          else
            tar -czvf ${ARCHIVE_NAME}.tar.gz goani
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: goani-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/goani-*
          retention-days: 1

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List files
        run: ls -la dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
